name: Reporte Diario de Stock

on:
  schedule:
    # Todos los días a las 11:00 AM hora Chile (UTC-3 = 14:00 UTC)
    - cron: "0 14 * * *"
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  generar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar dependencias del sistema para Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxcb1 libxkbcommon0 \
            libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libatspi2.0-0 \
            libx11-xcb1 fonts-liberation libasound2t64

      - name: Instalar Chromium para Playwright
        run: playwright install chromium

      - name: Ejecutar scraper y enviar reporte
        env:
          WAITRY_USER:       ${{ secrets.WAITRY_USER }}
          WAITRY_PASSWORD:   ${{ secrets.WAITRY_PASSWORD }}
          PLACE_NAME:        ${{ secrets.PLACE_NAME }}
          WHATSAPP_TOKEN:    ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}
          DEMO_MODE:         "false"
          CATEGORIA_FILTRO:  "Pastelería _ Dulces y pasteles|Pastelería _ Postres y tortas|Pastelería _ Galletas"
          DEBUG_MODE:        "true"
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_TOKEN:          ${{ secrets.WA_TOKEN }}
          WA_RECIPIENTS:     ${{ secrets.WA_RECIPIENTS }}
        run: python main.py

      - name: Subir screenshots de debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: /tmp/waitry_*.png
          if-no-files-found: ignore
